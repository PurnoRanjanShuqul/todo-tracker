<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .app-container {
            width: 100%;
            max-width: 700px;
        }

        h1 {
            text-align: center;
            color: #fff;
            font-size: 2.2rem;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.4);
        }

        /* ---- TABS ---- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 10px 22px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            color: #ccc;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(102,126,234,0.5);
        }

        /* ---- CARD ---- */
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* ---- TAB PANEL ---- */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* ---- PANEL HEADER ---- */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-title {
            color: #fff;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .panel-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-top: 3px;
        }

        .progress-info {
            text-align: right;
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
        }

        /* ---- PROGRESS BAR ---- */
        .progress-wrap {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.4s ease;
            width: 0%;
        }

        /* ---- INPUT ROW ---- */
        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-row input[type="text"] {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
            transition: border 0.3s;
        }

        .input-row input[type="text"]::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .input-row input[type="text"]:focus {
            border-color: #667eea;
            background: rgba(255,255,255,0.18);
        }

        .input-row input[type="date"] {
            padding: 12px 14px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
        }

        .input-row input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .add-btn {
            padding: 12px 22px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .add-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102,126,234,0.5);
        }

        /* ---- FILTERS ---- */
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        /* ---- GOAL LIST ---- */
        .goal-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .goal-list::-webkit-scrollbar {
            width: 5px;
        }

        .goal-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .goal-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* ---- GOAL ITEM ---- */
        .goal-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.07);
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .goal-item:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.15);
        }

        .goal-item.completed {
            opacity: 0.55;
            border-color: rgba(102,234,141,0.2);
        }

        .goal-item.overdue {
            border-left: 3px solid #ff6b6b;
        }

        /* Custom Checkbox */
        .goal-check {
            width: 22px;
            height: 22px;
            min-width: 22px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: transparent;
        }

        .goal-check.checked {
            background: linear-gradient(135deg, #56ab2f, #a8e063);
            border-color: transparent;
        }

        .goal-check .check-icon {
            color: #fff;
            font-size: 0.75rem;
            display: none;
        }

        .goal-check.checked .check-icon {
            display: block;
        }

        /* Goal Info */
        .goal-info {
            flex: 1;
            min-width: 0;
        }

        .goal-text {
            color: #fff;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .goal-item.completed .goal-text {
            text-decoration: line-through;
            color: rgba(255,255,255,0.5);
        }

        .goal-meta {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            flex-wrap: wrap;
        }

        .goal-date {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        .goal-tag {
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 600;
        }

        .tag-weekly {
            background: rgba(100,200,255,0.2);
            color: #64c8ff;
        }

        .tag-monthly {
            background: rgba(255,165,100,0.2);
            color: #ffa564;
        }

        .tag-yearly {
            background: rgba(200,100,255,0.2);
            color: #c864ff;
        }

        .overdue-label {
            font-size: 0.7rem;
            color: #ff6b6b;
            font-weight: 600;
        }

        /* Priority Badge */
        .priority-badge {
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 600;
        }

        .priority-high {
            background: rgba(255,80,80,0.2);
            color: #ff6b6b;
        }

        .priority-medium {
            background: rgba(255,200,80,0.2);
            color: #ffc850;
        }

        .priority-low {
            background: rgba(80,200,120,0.2);
            color: #50c878;
        }

        /* Goal Actions */
        .goal-actions {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
            border-radius: 8px;
            transition: background 0.2s;
            color: rgba(255,255,255,0.5);
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        /* ---- EMPTY STATE ---- */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255,255,255,0.3);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* ---- STATS ROW ---- */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        .stat-box {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-top: 3px;
        }

        /* ---- PRIORITY + DATE ROW ---- */
        .extra-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .extra-row select {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-size: 0.85rem;
            outline: none;
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
            appearance: none;
        }

        .extra-row select option {
            background: #1a1a2e;
            color: #fff;
        }

        /* ---- TOAST ---- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            padding: 14px 22px;
            border-radius: 14px;
            font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ---- EDIT MODAL ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 440px;
            animation: slideIn 0.3s ease;
        }

        .modal h3 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        .modal input,
        .modal select {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }

        .modal input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        .modal select option {
            background: #1a1a2e;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .modal-btns button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.18);
        }

        @media (max-width: 500px) {
            .input-row {
                flex-wrap: wrap;
            }

            .stats-row {
                flex-wrap: wrap;
            }

            .stat-box {
                min-width: 80px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🎯 Todo Tracker</h1>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('daily')">📋 Daily</button>
        <button class="tab-btn" onclick="switchTab('weekly')">📅 Weekly</button>
        <button class="tab-btn" onclick="switchTab('monthly')">🗓️ Monthly</button>
        <button class="tab-btn" onclick="switchTab('yearly')">🏆 Yearly</button>
    </div>

    <div class="card">

        <!-- ===================== DAILY TAB ===================== -->
        <div class="tab-panel active" id="panel-daily">
            <div class="panel-header">
                <div>
                    <div class="panel-title">Daily Tasks</div>
                    <div class="panel-subtitle" id="daily-date-label"></div>
                </div>
                <div class="progress-info" id="daily-progress-text">0 / 0</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="daily-progress-bar"></div>
            </div>
            <div class="input-row">
                <input type="text" id="daily-input" placeholder="Add a daily task..." />
                <button class="add-btn" onclick="addGoal('daily')">+ Add</button>
            </div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="setFilter('daily','all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('daily','pending',this)">Pending</button>
                <button class="filter-btn" onclick="setFilter('daily','completed',this)">Completed</button>
            </div>
            <ul class="goal-list" id="daily-list"></ul>
            <div class="stats-row" id="daily-stats"></div>
        </div>

        <!-- ===================== WEEKLY TAB ===================== -->
        <div class="tab-panel" id="panel-weekly">
            <div class="panel-header">
                <div>
                    <div class="panel-title">Weekly Goals</div>
                    <div class="panel-subtitle" id="weekly-date-label"></div>
                </div>
                <div class="progress-info" id="weekly-progress-text">0 / 0</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="weekly-progress-bar"></div>
            </div>
            <div class="input-row">
                <input type="text" id="weekly-input" placeholder="Add a weekly goal..." />
                <input type="date" id="weekly-due" />
                <button class="add-btn" onclick="addGoal('weekly')">+ Add</button>
            </div>
            <div class="extra-row">
                <select id="weekly-priority">
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                    <option value="low">🟢 Low Priority</option>
                </select>
            </div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="setFilter('weekly','all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('weekly','pending',this)">Pending</button>
                <button class="filter-btn" onclick="setFilter('weekly','completed',this)">Completed</button>
                <button class="filter-btn" onclick="setFilter('weekly','overdue',this)">Overdue</button>
            </div>
            <ul class="goal-list" id="weekly-list"></ul>
            <div class="stats-row" id="weekly-stats"></div>
        </div>

        <!-- ===================== MONTHLY TAB ===================== -->
        <div class="tab-panel" id="panel-monthly">
            <div class="panel-header">
                <div>
                    <div class="panel-title">Monthly Goals</div>
                    <div class="panel-subtitle" id="monthly-date-label"></div>
                </div>
                <div class="progress-info" id="monthly-progress-text">0 / 0</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="monthly-progress-bar"></div>
            </div>
            <div class="input-row">
                <input type="text" id="monthly-input" placeholder="Add a monthly goal..." />
                <input type="date" id="monthly-due" />
                <button class="add-btn" onclick="addGoal('monthly')">+ Add</button>
            </div>
            <div class="extra-row">
                <select id="monthly-priority">
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                    <option value="low">🟢 Low Priority</option>
                </select>
            </div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="setFilter('monthly','all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('monthly','pending',this)">Pending</button>
                <button class="filter-btn" onclick="setFilter('monthly','completed',this)">Completed</button>
                <button class="filter-btn" onclick="setFilter('monthly','overdue',this)">Overdue</button>
            </div>
            <ul class="goal-list" id="monthly-list"></ul>
            <div class="stats-row" id="monthly-stats"></div>
        </div>

        <!-- ===================== YEARLY TAB ===================== -->
        <div class="tab-panel" id="panel-yearly">
            <div class="panel-header">
                <div>
                    <div class="panel-title">Yearly Goals</div>
                    <div class="panel-subtitle" id="yearly-date-label"></div>
                </div>
                <div class="progress-info" id="yearly-progress-text">0 / 0</div>
            </div>
            <div class="progress-wrap">
                <div class="progress-bar" id="yearly-progress-bar"></div>
            </div>
            <div class="input-row">
                <input type="text" id="yearly-input" placeholder="Add a yearly goal..." />
                <input type="date" id="yearly-due" />
                <button class="add-btn" onclick="addGoal('yearly')">+ Add</button>
            </div>
            <div class="extra-row">
                <select id="yearly-priority">
                    <option value="medium">🟡 Medium Priority</option>
                    <option value="high">🔴 High Priority</option>
                    <option value="low">🟢 Low Priority</option>
                </select>
            </div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="setFilter('yearly','all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('yearly','pending',this)">Pending</button>
                <button class="filter-btn" onclick="setFilter('yearly','completed',this)">Completed</button>
                <button class="filter-btn" onclick="setFilter('yearly','overdue',this)">Overdue</button>
            </div>
            <ul class="goal-list" id="yearly-list"></ul>
            <div class="stats-row" id="yearly-stats"></div>
        </div>

    </div><!-- end card -->
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3>✏️ Edit Goal</h3>
        <input type="text" id="modal-text" placeholder="Goal text..." />
        <input type="date" id="modal-due" />
        <select id="modal-priority">
            <option value="medium">🟡 Medium Priority</option>
            <option value="high">🔴 High Priority</option>
            <option value="low">🟢 Low Priority</option>
        </select>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>

<script>
    // =============================================
    //  STATE
    // =============================================
    const TYPES = ['daily', 'weekly', 'monthly', 'yearly'];

    // Each goal: { id, text, completed, due, priority, createdAt }
    let goals = {
        daily: [],
        weekly: [],
        monthly: [],
        yearly: []
    };

    let filters = {
        daily: 'all',
        weekly: 'all',
        monthly: 'all',
        yearly: 'all'
    };

    let editState = { type: null, id: null };

    // =============================================
    //  INIT
    // =============================================
    function init() {
        loadFromStorage();
        setDateLabels();
        setDefaultDueDates();
        TYPES.forEach(type => renderList(type));

        // Enter key support
        TYPES.forEach(type => {
            document.getElementById(`${type}-input`)
                .addEventListener('keydown', e => {
                    if (e.key === 'Enter') addGoal(type);
                });
        });
    }

    function setDateLabels() {
        const now = new Date();

        document.getElementById('daily-date-label').textContent =
            now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Week range
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay());
        const endOfWeek = new Date(startOfWeek);
        endOfWeek.setDate(startOfWeek.getDate() + 6);
        document.getElementById('weekly-date-label').textContent =
            `${fmtDate(startOfWeek)} – ${fmtDate(endOfWeek)}`;

        document.getElementById('monthly-date-label').textContent =
            now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

        document.getElementById('yearly-date-label').textContent =
            `Year ${now.getFullYear()}`;
    }

    function setDefaultDueDates() {
        const now = new Date();

        // Weekly: end of this week (Sunday)
        const endOfWeek = new Date(now);
        endOfWeek.setDate(now.getDate() + (6 - now.getDay()));
        document.getElementById('weekly-due').value = toInputDate(endOfWeek);

        // Monthly: end of this month
        const endOfMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0);
        document.getElementById('monthly-due').value = toInputDate(endOfMonth);

        // Yearly: Dec 31
        const endOfYear = new Date(now.getFullYear(), 11, 31);
        document.getElementById('yearly-due').value = toInputDate(endOfYear);
    }

    function fmtDate(date) {
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function toInputDate(date) {
        return date.toISOString().split('T')[0];
    }

    // =============================================
    //  STORAGE
    // =============================================
    function saveToStorage() {
        localStorage.setItem('tracker_goals', JSON.stringify(goals));
    }

    function loadFromStorage() {
        const data = localStorage.getItem('tracker_goals');
        if (data) {
            const parsed = JSON.parse(data);
            TYPES.forEach(type => {
                if (parsed[type]) goals[type] = parsed[type];
            });
        }
    }

    // =============================================
    //  TAB SWITCHING
    // =============================================
    function switchTab(type) {
        // Panels
        TYPES.forEach(t => {
            document.getElementById(`panel-${t}`).classList.remove('active');
        });
        document.getElementById(`panel-${type}`).classList.add('active');

        // Buttons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    // =============================================
    //  ADD GOAL
    // =============================================
    function addGoal(type) {
        const input = document.getElementById(`${type}-input`);
        const text = input.value.trim();

        if (!text) {
            showToast('⚠️ Please enter a goal!');
            input.focus();
            return;
        }

        const dueEl = document.getElementById(`${type}-due`);
        const priorEl = document.getElementById(`${type}-priority`);

        const goal = {
            id: Date.now(),
            text: text,
            completed: false,
            due: dueEl ? dueEl.value : '',
            priority: priorEl ? priorEl.value : 'medium',
            createdAt: new Date().toISOString()
        };

        goals[type].unshift(goal);
        saveToStorage();
        renderList(type);

        input.value = '';
        showToast('✅ Goal added!');
    }

    // =============================================
    //  TOGGLE COMPLETE
    // =============================================
    function toggleGoal(type, id) {
        const goal = goals[type].find(g => g.id === id);
        if (goal) {
            goal.completed = !goal.completed;
            if (goal.completed) goal.completedAt = new Date().toISOString();
            else delete goal.completedAt;
            saveToStorage();
            renderList(type);
            showToast(goal.completed ? '🎉 Goal completed!' : '↩️ Marked as pending');
        }
    }

    // =============================================
    //  DELETE
    // =============================================
    function deleteGoal(type, id) {
        goals[type] = goals[type].filter(g => g.id !== id);
        saveToStorage();
        renderList(type);
        showToast('🗑️ Goal deleted');
    }

    // =============================================
    //  EDIT MODAL
    // =============================================
    function openEdit(type, id) {
        const goal = goals[type].find(g => g.id === id);
        if (!goal) return;

        editState = { type, id };
        document.getElementById('modal-text').value = goal.text;
        document.getElementById('modal-due').value = goal.due || '';
        document.getElementById('modal-priority').value = goal.priority || 'medium';
        document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modal-overlay').classList.remove('open');
        editState = { type: null, id: null };
    }

    function saveEdit() {
        const { type, id } = editState;
        if (!type || !id) return;

        const goal = goals[type].find(g => g.id === id);
        if (!goal) return;

        const newText = document.getElementById('modal-text').value.trim();
        if (!newText) {
            showToast('⚠️ Goal text cannot be empty!');
            return;
        }

        goal.text = newText;
        goal.due = document.getElementById('modal-due').value;
        goal.priority = document.getElementById('modal-priority').value;

        saveToStorage();
        renderList(type);
        closeModal();
        showToast('✏️ Goal updated!');
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // =============================================
    //  FILTER
    // =============================================
    function setFilter(type, filter, btn) {
        filters[type] = filter;

        // Update active button
        const panel = document.getElementById(`panel-${type}`);
        panel.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        renderList(type);
    }

    // =============================================
    //  IS OVERDUE
    // =============================================
    function isOverdue(goal) {
        if (!goal.due || goal.completed) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const due = new Date(goal.due + 'T00:00:00');
        return due < today;
    }

    // =============================================
    //  RENDER
    // =============================================
    function renderList(type) {
        const listEl = document.getElementById(`${type}-list`);
        const filter = filters[type];

        let filtered = goals[type].filter(g => {
            if (filter === 'completed') return g.completed;
            if (filter === 'pending') return !g.completed;
            if (filter === 'overdue') return isOverdue(g);
            return true;
        });

        // Stats (always from ALL goals)
        const all = goals[type];
        const totalAll = all.length;
        const completedAll = all.filter(g => g.completed).length;
        const overdueAll = all.filter(g => isOverdue(g)).length;
        const pct = totalAll ? Math.round((completedAll / totalAll) * 100) : 0;

        // Progress
        document.getElementById(`${type}-progress-bar`).style.width = pct + '%';
        document.getElementById(`${type}-progress-text`).textContent =
            `${completedAll} / ${totalAll} (${pct}%)`;

        // Stats boxes
        document.getElementById(`${type}-stats`).innerHTML = `
            <div class="stat-box">
                <div class="stat-number">${totalAll}</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" style="color:#56ab2f">${completedAll}</div>
                <div class="stat-label">Done</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" style="color:#ffc850">${totalAll - completedAll}</div>
                <div class="stat-label">Pending</div>
            </div>
            ${type !== 'daily' ? `
            <div class="stat-box">
                <div class="stat-number" style="color:#ff6b6b">${overdueAll}</div>
                <div class="stat-label">Overdue</div>
            </div>` : ''}
        `;

        // Render items
        if (filtered.length === 0) {
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${getEmptyIcon(filter)}</div>
                    <p>${getEmptyMsg(filter, type)}</p>
                </div>`;
            return;
        }

        listEl.innerHTML = '';

        filtered.forEach(goal => {
            const overdue = isOverdue(goal);
            const li = document.createElement('li');
            li.className = `goal-item${goal.completed ? ' completed' : ''}${overdue ? ' overdue' : ''}`;

            li.innerHTML = `
                <div class="goal-check ${goal.completed ? 'checked' : ''}"
                     onclick="toggleGoal('${type}', ${goal.id})">
                    <span class="check-icon">✓</span>
                </div>
                <div class="goal-info">
                    <div class="goal-text">${escapeHTML(goal.text)}</div>
                    <div class="goal-meta">
                        ${goal.due ? `<span class="goal-date">📅 Due: ${formatDisplayDate(goal.due)}</span>` : ''}
                        ${overdue ? `<span class="overdue-label">⚠️ Overdue</span>` : ''}
                        ${goal.completed && goal.completedAt ? `<span class="goal-date">✅ Done: ${formatDisplayDate(goal.completedAt.split('T')[0])}</span>` : ''}
                        ${type !== 'daily' && goal.priority ? `
                            <span class="priority-badge priority-${goal.priority}">
                                ${goal.priority === 'high' ? '🔴' : goal.priority === 'low' ? '🟢' : '🟡'} ${capitalize(goal.priority)}
                            </span>` : ''}
                        ${type !== 'daily' ? `<span class="goal-tag tag-${type}">${capitalize(type)}</span>` : ''}
                    </div>
                </div>
                <div class="goal-actions">
                    <button class="action-btn" onclick="openEdit('${type}', ${goal.id})" title="Edit">✏️</button>
                    <button class="action-btn" onclick="deleteGoal('${type}', ${goal.id})" title="Delete">🗑️</button>
                </div>
            `;

            listEl.appendChild(li);
        });
    }

    // =============================================
    //  HELPERS
    // =============================================
    function escapeHTML(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function capitalize(str) {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function formatDisplayDate(dateStr) {
        if (!dateStr) return '';
        const [y, m, d] = dateStr.split('-');
        const date = new Date(+y, +m - 1, +d);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function getEmptyIcon(filter) {
        if (filter === 'completed') return '🎉';
        if (filter === 'overdue') return '✅';
        return '📭';
    }

    function getEmptyMsg(filter, type) {
        if (filter === 'completed') return 'No completed goals yet. Keep going!';
        if (filter === 'overdue') return 'No overdue goals. Great job!';
        if (filter === 'pending') return 'No pending goals!';
        return `No ${type} goals yet. Add one above!`;
    }

    // =============================================
    //  TOAST
    // =============================================
    let toastTimer;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // =============================================
    //  KICK OFF
    // =============================================
    init();
</script>
</body>
</html>
